<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather app</title>
    <link rel="stylesheet" href="weather.css" />
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input type="text" placeholder="enter city name" spellcheck="false" />
        <button>search</button>
      </div>
      <div class="error">
        <p>Invalid city name</p>
      </div>
      <div class="weather">
        <img src="images/rainy-day.png" class="weather-icon" />
        <h1 class="temp"></h1>
        <h2 class="city"></h2>
        <div class="details">
          <div class="col">
            <img src="images/humidity.png" />
            <div>
              <p class="humidity"></p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="images/wind.png" />
            <div>
              <p class="wind-speed"></p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    const api_key = "f9ec636431d1acbcdcbf1c2968c25a21";
    const api_url =
      "https://api.openweathermap.org/data/2.5/weather?units=metric&";

    const searchInput = document.querySelector(".search input");
    const searchBtn = document.querySelector(".search button");
    const weatherIcon = document.querySelector(".weather-icon");

    async function getWeather() {
      const city_name = searchInput.value;
      const response = await fetch(
        api_url + `q=${city_name}` + `&appid=${api_key}`,
      );
      const data = await response.json();
      return data;
    }

    function setWeather(data) {
      if (data.cod === "404" || data.cod === "400") {
        document.querySelector(".error").style.display = "block";
        document.querySelector(".weather").style.display = "none";
      } else {
        document.querySelector(".temp").innerHTML =
          Math.round(data.main.temp) + "°C";
        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".humidity").innerHTML =
          data.main.humidity + "%";
        document.querySelector(".wind-speed").innerHTML =
          data.wind.speed + "kmph";
        const weather = data.weather[0].main;
        if (weather === "Clouds") {
          weatherIcon.src = "images/cloudy.png";
        } else if (weather === "Clear") {
          weatherIcon.src = "images/sun.png";
        } else if (weather === "Rain") {
          weatherIcon.src = "images/rainy-day.png";
        } else if (weather === "Drizzle") {
          weatherIcon.src = "images/drizzle.png";
        } else if (weather === "Mist") {
          weatherIcon.src = "images/mist.png";
        }
        document.querySelector(".error").style.display = "none";
        document.querySelector(".weather").style.display = "block";
      }
    }

    searchBtn.addEventListener("click", async () => {
      const data = await getWeather();
      console.log(data);
      setWeather(data);
    });
  </script>
</html>
