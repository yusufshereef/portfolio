<!DOCTYPE html>
<html>
    <head>
        <title>Admission Form</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <form>
            <h2>Student Admission Form</h2>
            <fieldset>
                <legend>Personal Details</legend>
                
                <label>Full Name</label>
                <input type="text" required autofocus placeholder="Enter full Name">
                
                <label>Email</label>
                <input type="email" required placeholder="Enter email">

                <label>Password</label>
                <input type="password" min="6" required>

                <label>Mobile Number</label>
                <input type="tel" pattern="[0-9]{10}">
                
                <label>Date of Birth</label>
                <input type="date">
                
                <label>Age</label>
                <input type="number" min="17" max="60">
        </fieldset>
        <fieldset>
            <legend>Academic Details</legend>
            <label>Course</label>
            <select required>
                <option name="">select</option>
                <option>B.Tech</option>
                <option>BCA</option>
                <option>MBA</option>
                <option>Arts & Sciences</option>
            </select>
            <label>Branch</label>
            <input type="text" list="branches">
                <datalist id="branches">
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>AIDS</option>
                <label>Percentage</label>
                <input type="range" min="35" max="100">
                </datalist>
            </fieldset>
            <fieldset>
                <legend>Preferences</legend>
                
                <label>Gender</label>
                <input type="radio" name="gender">Female
                <input type="radio" name="gender">Male
                
                <br><label>Languages Known</label>
                <input type="checkbox">Telugu
                <input type="checkbox">Hindi
                <input type="checkbox">English

             <br><label>Submit Documents</label>   
             <input type="file">
             
             <label>Feedback</label>
             <textarea rows="5"></textarea>
             </fieldset>    
             <button>Submit</button>
             <button>Cancel</button>
                    
        </form>
    </body>
</html>
