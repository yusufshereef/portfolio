<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Query Width Example</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f0f0f0;
  margin: 0;
  padding: 20px;
}

.box {
  background-color: gray;
  color: white;
  padding: 40px;
  text-align: center;
  font-size: 24px;
  border-radius: 10px;
  transition: all 0.4s ease;
}

    }

*/

@media (max-width: 350px) {
  .box {
    background-color: green;
    color: white;
  }
}

@media (min-width: 351px) and (max-width: 850px) {
    .box{
        background-color: blue;
    }
}

@media (min-width: 851px) {
    .box {
        background-color: red;
    }
}

</style>
</head>

<body>

<h2>Media Query Width Features</h2>
<p>Resize the browser window to see the background color change.</p>

<div class="box">
  Resize the screen<br>
  Color changes using media queries
</div>

</body>
</html>
