<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML Tags Demo</title>
</head>
<body>
    <div>
        <h2>This is a DIV Tag</h2>
        <p>
            The div tag is used to group elements together.
            It helps in organizing content on a web page.
        </p>
    </div>
    <hr>

        <div>
        <h2>This is an Anchor (a) Tag</h2>
        <p>
            Click the link below to visit Google:
        </p>
        <a href="https://www.google.com" target="_blank">
            Go to Google
        </a>
    </div>
    <hr>
    <div>
        <h2>This is an Image (img) Tag</h2>
        <p>
            The image below is displayed using the img tag:
        </p>
        <img src="https://cdn.pixabay.com/photo/2021/12/29/14/47/water-6901805_1280.jpg" width=300 height=300 alt="Sample Image">
    </div>

</body>
</html>
