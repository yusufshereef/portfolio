<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function change(){
            document.getElementById("h1-tag").style.backgroundColor="red" 
        }

        function reset(){
            document.getElementById("h1-tag").style.textAlign='center'
        }
    </script>
</head>
<body>
    <h1 id="h1-tag" >Welcome</h1>
    <button onclick="change()">change</button>
    <button onclick="reset()">reset</button>
</body>
</html>
