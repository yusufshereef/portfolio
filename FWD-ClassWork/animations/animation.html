<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced CSS Animations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to left, #667eea, #764ba2);
        text-align: center;    
        color: white;
    }
    .main{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }
    .card{
        width: 260px;
        background: linear-gradient(to right, yellow, #01651c);
        border-radius: 25px;
        padding: 20px;
        border: 5px solid skyblue;
        transition: all 0.3s none;
    }

    .card:hover{
        transform: translate(5px, -5px);
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
    }

    .loader{
        width: 50px;
        height: 50px;
        border: 5px solid blue;
        margin: auto;
        border-top: 5px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin{
        from{
            transform: rotate(0deg);
        }
        to{
            transform: rotate(360deg);

        }
    }

    .loader-card{

    }
/*
    .bounce-card{
        animation: bounce 0.3s infinite;
    }

    @keyframes bounce{
        from{
            transform: translateY(-10px);
        }
        to{
            transform: translateY(0);
        }
    }

    .rotate-card{
        animation: rotate 0.5s infinite;
    }

    @keyframes rotate {
        from{
            transform: rotate(0);
        }
        to{
            transform: rotate(360deg);
        }
    } */

    h1{
        transition: all 0.10s ease;
        animation: colorChange 0.3s ease infinite;
    }

    @keyframes colorChange {
        from { background: red; }
        to { background: blue; }
    }

    h1:hover{
        color: #999;
        transform: translateY(-10px); 
        box-shadow: red 0px 5px 15px 8px;
    }
    button{
        transition: all 0.3s ease;
    }
    button:hover{
        background-color:black;
        color:white;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
    }

</style>
<body>
<h1>
    Animation Examples
</h1>
<div class="main">
    <div class = "card bounce-card rotate-card">
        <h2>card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card loader-card">
        <div class="loader"></div>
        <h2>loader card</h2>
        <button>Click Me</button>
    </div>
</div>
</body>
</html>
