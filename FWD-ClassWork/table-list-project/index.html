<!DOCTYPE html>
<html>
<head>
    <title>Table and List Example</title>
</head>
<body>
<div style="display: grid;">
    <div>
        <h2>Student Table</h2>
        <table border="1">
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Ravi</td>
            <td>HTML</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Sita</td>
            <td>CSS</td>
        </tr>
</table>
</div>
<hr>
<div>
<h2>Ordered List</h2>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<h2>Unordered List</h2>
<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Orange</li>
</ul>

<h2>Definition List</h2>
<dl>
    <dt>HTML</dt>
    <dd>Used to create web pages</dd>

    <dt>CSS</dt>
    <dd>Used for styling web pages</dd>
</dl>
</div>
</body>
</html>
